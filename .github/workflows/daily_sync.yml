name: Daily Job Sync
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install feedparser beautifulsoup4 psycopg2-binary

      - name: Run scraper
        env:
          PG_URL: ${{ secrets.PG_URL }}
        run: python main.py
