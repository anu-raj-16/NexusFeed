<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>NexusFeed</title>
        <style>
            body { font-family: 'Oswald', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 40px; }
            .job-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.2s; }
            .job-card:hover { transform: translateY(-5px); }
            h3 { color: #1aaee8; margin-top: 0; }
            #search { padding: 10px; width: 300px; border-radius: 6px; border: 1px solid #ddd; }
            button { padding: 10px 20px; border-radius: 6px; border: none; background: #1aaee8; color: white; cursor: pointer; }
            .match-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 5px solid #1aaee8; }

            .score-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-weight: bold; color: white; margin-bottom: 10px; }

            .score-high { background-color: #27ae60; }
            .score-mid { background-color: #f39c12; }
            .score-low { background-color: #e74c3c; }

            .search-section { margin-bottom: 20px; }
            .resume-section { margin-bottom: 30px; }

            #loading { text-align: center; color: #666; font-style: italic; }
        </style>
        <script>
            function escapeHtml(str) {
                const d = document.createElement('div');
                d.textContent = str;
                return d.innerHTML;
            }

            document.addEventListener('DOMContentLoaded', () => {
                loadJobs();
            });
            async function uploadResume() {
                console.log("uploadResume called");

                const container = document.getElementById('match-section');
                container.innerHTML = "<p>Analyzing your resume... this may take a minute.</p>";

                const file = document.getElementById('resumeFile').files[0];
                const formData = new FormData();
                formData.append('file', file);

                const res = await fetch('https://nexusfeed-06zv.onrender.com/api/resumes/upload', {
                    method: 'POST',
                    body: formData
                });

                const msg = await res.text();
                const promptRes = await fetch('https://nexusfeed-06zv.onrender.com/api/resumes/'+ msg + '/match', {
                    method: 'GET'
                });

                const finalRes = await promptRes.text();
                const matches = JSON.parse(finalRes);
                console.log("finalRes:", finalRes);
                console.log("matches:", matches);
                if (!Array.isArray(matches) || matches.length === 0) {
                    container.innerHTML = "<p>No matches found. Try again in a moment.</p>";
                    return;
                }
                const htmlTemplate = matches.map(match => {
                const scoreClass = match.score >= 70 ? 'score-high' : match.score >= 40 ? 'score-mid' : 'score-low';
                return `
                        <div class="match-card">
                            <span class="score-badge ${scoreClass}">${match.score}% Match</span>
                            <h3>${escapeHtml(match.job.title)}</h3>
                            <p><strong>Source:</strong> ${escapeHtml(match.job.source)}</p>
                            <p><strong>Matched:</strong> ${match.matchedSkills.join(', ')}</p>
                            <p><strong>Gaps:</strong> ${match.gaps.join(', ')}</p>
                        </div>`;
                }).join('');
                container.innerHTML = htmlTemplate;
            }
            async function loadJobs() {
                const container = document.getElementById('jobs-section');
                const keyword = document.getElementById('search').value; 

                url = `https://nexusfeed-06zv.onrender.com/api/jobs`
                if (keyword) {
                    url = `https://nexusfeed-06zv.onrender.com/api/jobs/search?keyword=${keyword}`
                }
                try {
                    const res = await fetch(url);

                    if (res.ok) {
                        const jobs = await res.json();
                        console.log("Jobs received:", jobs);
                        const htmlTemplate = jobs.map(job => `
                            <div class="job-card">
                                <h3>${escapeHtml(job.title)}</h3>
                                <p>${escapeHtml(job.description)}</p>
                                <p>Source: ${escapeHtml(job.source)} | Published: ${escapeHtml(job.published)}</p>
                            </div>`
                        ).join('');

                        container.innerHTML = htmlTemplate;
                    } else {
                        container.innerHTML = "<p>No jobs found for that keyword.</p>";
                    }
                } catch (error) {
                    container.innerHTML = "<p>Backend is offline. Run your Java app!</p>";
                }
            }
        </script>
    </head>
    <body>
        <h1>NexusFeed</h1>
        
        <div class="search-section">
            <input type="text" id="search" placeholder="Search jobs...">
            <button type="button" onclick="loadJobs()">Search</button>
        </div>
    
        <div class="resume-section">
            <input type="file" id="resumeFile" accept=".pdf">
            <button type="button" onclick="uploadResume()">Match My Resume</button>
        </div>
    
        <div id="jobs-section">
            <p>Loading jobs...</p>
        </div>
    
        <div id="match-section"></div>
    </body>
</html>
